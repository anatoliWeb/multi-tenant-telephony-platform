x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: multi_tenant_telephony_platform_backend
    working_dir: /var/www
    restart: unless-stopped
    volumes:
      - ./backend:/var/www
    command: sh /var/www/docker/entrypoint.sh
    env_file:
      - .env
    environment:
      - REVERB_BROADCAST_HOST=reverb
    depends_on:
      - mysql
      - redis
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: multi_tenant_telephony_platform_reverb
    working_dir: /var/www
    restart: unless-stopped
    volumes:
      - ./backend:/var/www
    env_file:
      - .env
    environment:
      - REVERB_HOST=localhost
      - REVERB_BROADCAST_HOST=reverb
    ports:
      - "6001:6001"
    command: sh -c "php artisan reverb:start --host=0.0.0.0 --port=6001"
    depends_on:
      - backend
      - redis
    logging: *default-logging

  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: multi_tenant_telephony_platform_queue_worker
    working_dir: /var/www
    restart: unless-stopped
    volumes:
      - ./backend:/var/www
      - ./docker/supervisor/supervisord.conf:/etc/supervisor/supervisord.conf
    command: sh /var/www/docker/queue/entrypoint.sh
    env_file:
      - .env
    depends_on:
      - backend
      - redis
      - mysql
    logging: *default-logging

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: multi_tenant_telephony_platform_horizon
    working_dir: /var/www
    restart: unless-stopped
    profiles: ["horizon"]
    volumes:
      - ./backend:/var/www
    command: php artisan horizon
    env_file:
      - .env
    depends_on:
      - backend
      - redis
      - mysql
    logging: *default-logging

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: multi_tenant_telephony_platform_scheduler
    working_dir: /var/www
    restart: unless-stopped
    volumes:
      - ./backend:/var/www
    command: php artisan schedule:work
    env_file:
      - .env
    depends_on:
      - backend
      - redis
      - mysql
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    container_name: multi_tenant_telephony_platform_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    logging: *default-logging

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: multi_tenant_telephony_platform_frontend
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=700
      - WATCHPACK_POLLING=true
    ports:
      - "${FRONT_PORT}:4200"
    command: >
      sh -c "
      mkdir -p src/assets &&
      printf '{\n  \"apiUrl\": \"http://localhost:%s/api\"\n}\n' \"$APP_PORT\" > src/assets/config.json &&
      echo Backend: http://localhost:$APP_PORT &&
      echo Frontend: http://localhost:$FRONT_PORT &&
      if [ ! -d node_modules/@angular ]; then npm ci; fi &&
      npm run start
      "
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:4200', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 40s
    logging: *default-logging

  vue-frontend:
    image: node:20-alpine
    container_name: multi_tenant_telephony_platform_vue_frontend
    working_dir: /var/www
    restart: unless-stopped
    volumes:
      - ./backend:/var/www
      - vue_node_modules:/var/www/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1500
    ports:
      - "5173:5173"
    command: >
      sh -c "
      if [ ! -d node_modules/vite ]; then npm ci; fi &&
      npm run dev -- --host 0.0.0.0 --port 5173
      "
    depends_on:
      - backend
    logging: *default-logging

  mysql:
    image: mysql:8.0
    container_name: multi_tenant_telephony_platform_mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./docker/data/mysql:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: multi_tenant_telephony_platform_redis
    restart: unless-stopped
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./docker/data/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *default-logging

  # Optional local FreeSWITCH runtime.
  # Fake PBX remains the default telephony provider; this profile only
  # prepares the container boundary for future call-control wiring.
  # The selected image is publicly pullable and ships working defaults, so the
  # foundation slice keeps the service optional and boot-safe without a custom
  # FreeSWITCH filesystem overlay.
  # The image ships its own defaults, so we avoid bind-mounting /etc/freeswitch
  # here; an empty config mount can shadow the runtime and prevent boot.
  freeswitch:
    image: servicebots/freeswitch:latest
    restart: unless-stopped
    profiles: ["freeswitch"]
    ports:
      # Event Socket stays localhost-only; exposing ESL publicly would permit
      # unsafe call-control access from outside the developer machine.
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5061:5061/tcp"
      - "5080:5080/tcp"
      - "7443:7443/tcp"
      - "127.0.0.1:8021:8021/tcp"
      - "18000-19000:18000-19000/udp"
    logging: *default-logging

volumes:
  frontend_node_modules:
  vue_node_modules:
