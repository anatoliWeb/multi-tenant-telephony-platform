server {
    listen 80;
    server_name localhost;
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    root /var/www/public;
    index index.php index.html;
    autoindex off;

    # Deny access to hidden files (.env, .git, etc.), except ACME/.well-known.
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /api {
        try_files $uri /index.php?$query_string;
    }

    location ~* ^/build/assets/.*\.(js|css|mjs|map|png|jpg|jpeg|gif|svg|webp|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(js|css|mjs|png|jpg|jpeg|gif|svg|webp|ico|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
