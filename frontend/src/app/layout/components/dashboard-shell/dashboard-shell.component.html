<section class="dashboard-shell">
  <app-sidebar />

  <section class="dashboard-shell__main">
    <app-topbar
      [currentLocale]="localeService.currentLocale"
      [userName]="(authState.user$ | async)?.name || ''"
      [locales]="enabledLocales"
      [tenants]="tenants$ | async"
      [activeTenantId]="activeTenantId$ | async"
      [canOpenSoftphone]="canOpenSoftphone"
      (localeChange)="switchLocale($event)"
      (tenantChange)="switchTenant($event)"
      (softphoneClick)="openSoftphone()"
      (logout)="logout()"
    />

    <app-content-wrapper />
    <app-footer />

    <app-softphone-modal [open]="isSoftphoneOpen" (close)="closeSoftphone()" />
  </section>

  <app-notification-host />
</section>
