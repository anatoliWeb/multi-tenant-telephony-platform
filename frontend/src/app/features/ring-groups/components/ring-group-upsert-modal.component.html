<app-modal-shell [open]="open" (close)="close.emit()">
  <header class="panel__header">
    <div>
      <h3>{{ titleKey | t }}</h3>
      <p>{{ 'ringGroups.modal.subtitle' | t }}</p>
    </div>
    <button type="button" class="close-button" (click)="close.emit()">&times;</button>
  </header>

  <div class="panel__body">
    <div class="grid">
      <label>
        <span>{{ 'ringGroups.fields.name' | t }}</span>
        <input [(ngModel)]="draft.name" data-testid="ring-group-name" />
      </label>
      <label>
        <span>{{ 'ringGroups.fields.slug' | t }}</span>
        <input [(ngModel)]="draft.slug" />
      </label>
      <label class="grid-span-2">
        <span>{{ 'ringGroups.fields.description' | t }}</span>
        <textarea [(ngModel)]="draft.description" rows="3"></textarea>
      </label>
      <label>
        <span>{{ 'ringGroups.fields.strategy' | t }}</span>
        <select [(ngModel)]="draft.strategy">
          <option *ngFor="let strategy of strategies" [ngValue]="strategy">{{ ('ringGroups.strategy.' + strategy) | t }}</option>
        </select>
      </label>
      <label>
        <span>{{ 'ringGroups.fields.status' | t }}</span>
        <select [(ngModel)]="draft.status">
          <option *ngFor="let status of statuses" [ngValue]="status">{{ ('ringGroups.status.' + status) | t }}</option>
        </select>
      </label>
      <label>
        <span>{{ 'ringGroups.fields.ringTimeout' | t }}</span>
        <input type="number" [(ngModel)]="draft.ring_timeout_seconds" min="1" max="300" />
      </label>
      <label>
        <span>{{ 'ringGroups.fields.maxRingDuration' | t }}</span>
        <input type="number" [(ngModel)]="draft.max_ring_duration_seconds" min="1" max="3600" />
      </label>
    </div>
  </div>

  <footer class="panel__footer">
    <app-button (click)="close.emit()">{{ 'common.actions.close' | t }}</app-button>
    <app-button [disabled]="saving || !draft.name.trim()" (click)="emitSave()">
      {{ saving ? ('common.states.saving' | t) : ('common.actions.save' | t) }}
    </app-button>
  </footer>
</app-modal-shell>
